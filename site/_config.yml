title: Nexus News
description: "Daily Gaming, AR, VR & Tech News — AI-powered journalism covering the stories that matter"
baseurl: "/Nexus"
url: "https://OverNexus.github.io"
author: Nexus News Editorial
lang: en

permalink: /posts/:slug/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-sitemap

paginate: 9
paginate_path: "/page/:num/"

markdown: kramdown
highlighter: rouge

# SEO
twitter:
  username: nexusnews
logo: /assets/img/logo.png
social:
  name: Nexus News
  links: []

# Feed
feed:
  title: Nexus News
  description: "Daily Gaming, AR, VR & Tech News"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Nexus News Editorial"
